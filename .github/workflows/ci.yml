name: Backend CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: backend-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fiestaaa_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d fiestaaa_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/fiestaaa_test
      RUST_BACKTRACE: "1"
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@1.90.0
        with:
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Audit dependencies
        run: cargo audit -D warnings

      - name: Run full test suite
        run: cargo test --locked --all-targets --jobs 1 -- --test-threads=1
