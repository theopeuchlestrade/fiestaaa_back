name: Backend CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: backend-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  workflow-lint:
    name: Workflow Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Run actionlint
        run: docker run --rm -v "${PWD}:/repo" --workdir /repo rhysd/actionlint:1.7.12@sha256:b1934ee5f1c509618f2508e6eb47ee0d3520686341fec936f3b79331f9315667 -color

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Run gitleaks
        run: docker run --rm -v "${PWD}:/repo" --workdir /repo ghcr.io/gitleaks/gitleaks:v8.30.0@sha256:691af3c7c5a48b16f187ce3446d5f194838f91238f27270ed36eef6359a574d9 detect --source=. --redact=100 --verbose

  dockerfile-check:
    name: Dockerfile Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.2.0

      - name: Check Dockerfile
        run: docker build --check .

  format:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all --check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: clippy

      - name: Run clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 35
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fiestaaa_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d fiestaaa_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/fiestaaa_test
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@1.96.0

      - name: Run full test suite
        run: cargo test --locked --all-targets --jobs 1 -- --test-threads=1

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fiestaaa_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d fiestaaa_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/fiestaaa_test
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Run coverage suite
        run: |
          mkdir -p coverage
          cargo llvm-cov --locked --all-targets --lcov --output-path coverage/lcov.info -- --test-threads=1

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-coverage-lcov
          path: coverage/lcov.info
          if-no-files-found: error

  security:
    name: Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@1.96.0

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Audit dependencies
        run: cargo audit -D warnings

  container-build:
    name: Container Build & Scan
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.2.0

      - name: Build production image
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          load: true
          push: false
          tags: ghcr.io/${{ github.repository }}:ci-${{ github.sha }}

      - name: Scan production image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          scan-ref: ghcr.io/${{ github.repository }}:ci-${{ github.sha }}
          version: v0.71.0
          scanners: vuln
          vuln-type: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: "1"

  ci:
    name: Backend CI
    runs-on: ubuntu-latest
    needs:
      - workflow-lint
      - secret-scan
      - dockerfile-check
      - format
      - lint
      - test
      - coverage
      - security
      - container-build
    if: ${{ always() }}
    steps:
      - name: Check required jobs
        run: |
          if [ "${{ needs.workflow-lint.result }}" != "success" ] ||
             [ "${{ needs.secret-scan.result }}" != "success" ] ||
             [ "${{ needs.dockerfile-check.result }}" != "success" ] ||
             [ "${{ needs.format.result }}" != "success" ] ||
             [ "${{ needs.lint.result }}" != "success" ] ||
             [ "${{ needs.test.result }}" != "success" ] ||
             [ "${{ needs.coverage.result }}" != "success" ] ||
             [ "${{ needs.security.result }}" != "success" ] ||
             [ "${{ needs.container-build.result }}" != "success" ]; then
            echo "::error::One or more backend CI jobs failed"
            exit 1
          fi
