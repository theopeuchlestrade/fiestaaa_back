name: Bootstrap VPS Stack

on:
  workflow_dispatch:
    inputs:
      front_image_tag:
        description: "Existing ghcr.io/theopeuchlestrade/fiestaaa_front image tag to deploy."
        required: true
      force_build:
        description: "Ignore existing backend image and rebuild"
        type: boolean
        default: false

env:
  IMAGE: ghcr.io/theopeuchlestrade/fiestaaa_back
  TAG: ${{ github.sha }}

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://api.fiestaaa.app
    permissions:
      contents: read
      attestations: write
      artifact-metadata: write
      id-token: write
      packages: write
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Check required secrets
        env:
          ADMIN_EMAILS: ${{ secrets.ADMIN_EMAILS }}
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          AVATAR_BASE_URL: ${{ secrets.AVATAR_BASE_URL }}
          AVATAR_UPLOAD_DIR: ${{ secrets.AVATAR_UPLOAD_DIR }}
          BACKUP_INCLUDE_SECRETS: ${{ vars.BACKUP_INCLUDE_SECRETS || 'false' }}
          CORS_ALLOWED_ORIGINS: ${{ secrets.CORS_ALLOWED_ORIGINS }}
          DATA_ENCRYPTION_KEY: ${{ secrets.DATA_ENCRYPTION_KEY }}
          DATA_LOOKUP_KEY: ${{ secrets.DATA_LOOKUP_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          FCM_PROJECT_ID: ${{ secrets.FCM_PROJECT_ID }}
          FCM_SERVICE_ACCOUNT_JSON_B64: ${{ secrets.FCM_SERVICE_ACCOUNT_JSON_B64 }}
          FCM_SERVICE_ACCOUNT_PATH: ${{ secrets.FCM_SERVICE_ACCOUNT_PATH }}
          FIESTAAA_APPLE_REDIRECT_URI: ${{ secrets.FIESTAAA_APPLE_REDIRECT_URI }}
          FIESTAAA_APPLE_SERVICE_ID: ${{ secrets.FIESTAAA_APPLE_SERVICE_ID }}
          FIESTAAA_FCM_VAPID_KEY: ${{ secrets.FIESTAAA_FCM_VAPID_KEY }}
          FIESTAAA_GOOGLE_IOS_CLIENT_ID: ${{ secrets.FIESTAAA_GOOGLE_IOS_CLIENT_ID }}
          FIESTAAA_GOOGLE_WEB_CLIENT_ID: ${{ secrets.FIESTAAA_GOOGLE_WEB_CLIENT_ID }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          INVITATION_EMAIL_SENDER: ${{ secrets.INVITATION_EMAIL_SENDER }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          METRICS_BEARER_TOKEN: ${{ secrets.METRICS_BEARER_TOKEN }}
          NOTIFICATION_DEDUP_TTL_SECONDS: ${{ secrets.NOTIFICATION_DEDUP_TTL_SECONDS }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          missing=0
          for var in VPS_HOST VPS_PORT VPS_USER VPS_SSH_KEY GHCR_TOKEN; do
            if [ -z "${!var}" ]; then echo "::error::$var manquant"; missing=1; fi
          done
          for var in APP_BASE_URL AVATAR_BASE_URL AVATAR_UPLOAD_DIR CORS_ALLOWED_ORIGINS DATA_ENCRYPTION_KEY DATA_LOOKUP_KEY DATABASE_URL FCM_PROJECT_ID FCM_SERVICE_ACCOUNT_JSON_B64 FCM_SERVICE_ACCOUNT_PATH FIESTAAA_APPLE_REDIRECT_URI FIESTAAA_APPLE_SERVICE_ID FIESTAAA_FCM_VAPID_KEY FIESTAAA_GOOGLE_WEB_CLIENT_ID FIESTAAA_GOOGLE_IOS_CLIENT_ID RESEND_API_KEY INVITATION_EMAIL_SENDER JWT_SECRET METRICS_BEARER_TOKEN NOTIFICATION_DEDUP_TTL_SECONDS POSTGRES_DB POSTGRES_PASSWORD POSTGRES_USER REDIS_URL GRAFANA_ADMIN_PASSWORD SENTRY_DSN; do
            if [ -z "${!var}" ]; then echo "::error::$var manquant pour .env"; missing=1; fi
          done
          if [ -n "${FCM_SERVICE_ACCOUNT_JSON_B64:-}" ]; then
            tmp_service_account="$(mktemp)"
            if ! printf '%s' "${FCM_SERVICE_ACCOUNT_JSON_B64}" | base64 -d > "${tmp_service_account}"; then
              echo "::error::FCM_SERVICE_ACCOUNT_JSON_B64 n'est pas un base64 valide"
              missing=1
            elif ! jq -e '.type == "service_account" and (.project_id | type == "string" and length > 0) and (.client_email | type == "string" and length > 0) and (.private_key | type == "string" and contains("BEGIN PRIVATE KEY"))' "${tmp_service_account}" >/dev/null; then
              echo "::error::FCM_SERVICE_ACCOUNT_JSON_B64 ne contient pas un service-account.json Firebase valide"
              missing=1
            fi
            rm -f "${tmp_service_account}"
          fi
          if [ -z "${{ inputs.front_image_tag }}" ]; then echo "::error::front_image_tag manquant"; missing=1; fi
          if [ "$missing" -ne 0 ]; then exit 1; fi

      - name: Login to GHCR for push
        uses: docker/login-action@v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Check if backend image exists
        id: image_exists
        run: |
          if docker manifest inspect "$IMAGE:$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push backend image
        id: push
        if: steps.image_exists.outputs.exists == 'false' || inputs.force_build
        uses: docker/build-push-action@v6.18.0
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ env.TAG }}

      - name: Generate image attestation
        if: steps.push.outputs.digest != '' && !github.event.repository.private
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Sync production runtime files
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          set -euo pipefail
          key_path="${RUNNER_TEMP}/fiestaaa_deploy"
          printf '%s\n' "${VPS_SSH_KEY}" > "${key_path}"
          chmod 600 "${key_path}"
          ssh -i "${key_path}" \
            -p "${VPS_PORT}" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=accept-new \
            "${VPS_USER}@${VPS_HOST}" \
            "mkdir -p ~/apps/fiestaaa"
          scp -i "${key_path}" \
            -P "${VPS_PORT}" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=accept-new \
            docker-compose.prod.yml \
            "${VPS_USER}@${VPS_HOST}:~/apps/fiestaaa/docker-compose.yml"
          scp -i "${key_path}" \
            -P "${VPS_PORT}" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=accept-new \
            -r observability scripts \
            "${VPS_USER}@${VPS_HOST}:~/apps/fiestaaa/"
          ssh -i "${key_path}" \
            -p "${VPS_PORT}" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=accept-new \
            "${VPS_USER}@${VPS_HOST}" \
            "chmod +x ~/apps/fiestaaa/scripts/backup_runtime.sh ~/apps/fiestaaa/scripts/restore_drill_postgres.sh"
          rm -f "${key_path}"

      - name: Bootstrap stack on VPS
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          envs: ADMIN_EMAILS,APP_BASE_URL,AVATAR_BASE_URL,AVATAR_UPLOAD_DIR,BACKUP_INCLUDE_SECRETS,CORS_ALLOWED_ORIGINS,DATA_ENCRYPTION_KEY,DATA_LOOKUP_KEY,DATABASE_URL,FCM_PROJECT_ID,FCM_SERVICE_ACCOUNT_JSON_B64,FCM_SERVICE_ACCOUNT_PATH,FCM_SERVER_KEY,FIESTAAA_APPLE_APP_ID,FIESTAAA_APPLE_REDIRECT_URI,FIESTAAA_APPLE_SERVICE_ID,FIESTAAA_FCM_VAPID_KEY,FIESTAAA_GOOGLE_ANDROID_CLIENT_ID,FIESTAAA_GOOGLE_WEB_CLIENT_ID,FIESTAAA_GOOGLE_IOS_CLIENT_ID,GRAFANA_ADMIN_PASSWORD,GRAFANA_ADMIN_USER,METRICS_BEARER_TOKEN,POSTGRES_BACKUP_INTERVAL_SECONDS,POSTGRES_BACKUP_RETENTION_DAYS,RESEND_API_KEY,INVITATION_EMAIL_SENDER,JWT_SECRET,NOTIFICATION_DEDUP_TTL_SECONDS,POSTGRES_DB,POSTGRES_PASSWORD,POSTGRES_USER,REDIS_URL,SENTRY_DSN,SENTRY_ENVIRONMENT,SENTRY_TRACES_SAMPLE_RATE,GHCR_USERNAME,GHCR_TOKEN,VPS_USER,TAG,FRONT_IMAGE_TAG
          script: |
            set -euo pipefail
            cd ~/apps/fiestaaa
            umask 077
            sudo install -d -m 755 -o "${VPS_USER}" data
            sudo install -d -m 750 -o "${VPS_USER}" traefik
            sudo install -d -m 750 data/uploads data/uploads/avatars
            sudo chown 10001:10001 data/uploads data/uploads/avatars
            sudo chmod 750 data/uploads data/uploads/avatars
            sudo install -d -m 700 data/postgres
            sudo chown 999:999 data/postgres
            sudo chmod 700 data/postgres
            sudo install -d -m 750 -o "${VPS_USER}" -g "${VPS_USER}" data/backups data/backups/postgres data/backups/files secrets
            sudo install -d -m 750 data/prometheus data/loki data/grafana
            sudo chown 65534:65534 data/prometheus
            sudo chown 10001:10001 data/loki
            sudo chown 472:472 data/grafana
            tmp_metrics_token="$(mktemp)"
            printf '%s' "${METRICS_BEARER_TOKEN}" > "${tmp_metrics_token}"
            sudo install -m 400 -o 65534 -g 65534 "${tmp_metrics_token}" secrets/metrics_token
            rm -f "${tmp_metrics_token}"
            sudo install -d -m 700 -o root -g root traefik/letsencrypt
            sudo touch traefik/letsencrypt/acme.json
            sudo chown root:root traefik/letsencrypt/acme.json
            sudo chmod 600 traefik/letsencrypt/acme.json
            if [ -z "${FCM_SERVICE_ACCOUNT_JSON_B64:-}" ]; then
              echo "FCM_SERVICE_ACCOUNT_JSON_B64 missing; refusing to deploy with a placeholder service-account.json" >&2
              exit 1
            fi
            tmp_service_account="$(mktemp)"
            if ! printf '%s' "${FCM_SERVICE_ACCOUNT_JSON_B64}" | base64 -d > "${tmp_service_account}"; then
              echo "FCM_SERVICE_ACCOUNT_JSON_B64 is not valid base64" >&2
              rm -f "${tmp_service_account}"
              exit 1
            fi
            if ! grep -Eq '"private_key"[[:space:]]*:' "${tmp_service_account}" || ! grep -Eq '"client_email"[[:space:]]*:' "${tmp_service_account}" || ! grep -Eq '"project_id"[[:space:]]*:' "${tmp_service_account}"; then
              echo "Decoded FCM service account is missing private_key, client_email, or project_id" >&2
              rm -f "${tmp_service_account}"
              exit 1
            fi
            sudo install -m 400 "${tmp_service_account}" data/service-account.json
            sudo chown 10001:10001 data/service-account.json
            rm -f "${tmp_service_account}"
            install -m 600 /dev/null .env
            cat > .env <<EOF
            API_IMAGE_TAG=${TAG}
            FRONT_IMAGE_TAG=${FRONT_IMAGE_TAG}
            APP_BASE_URL=${APP_BASE_URL}
            AVATAR_BASE_URL=${AVATAR_BASE_URL}
            AVATAR_UPLOAD_DIR=${AVATAR_UPLOAD_DIR}
            CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
            DATA_ENCRYPTION_KEY=${DATA_ENCRYPTION_KEY}
            DATA_LOOKUP_KEY=${DATA_LOOKUP_KEY}
            DATABASE_URL=${DATABASE_URL}
            TRUST_PROXY_HEADERS=true
            FCM_PROJECT_ID=${FCM_PROJECT_ID}
            FCM_SERVICE_ACCOUNT_PATH=${FCM_SERVICE_ACCOUNT_PATH}
            FCM_SERVER_KEY=${FCM_SERVER_KEY}
            FIESTAAA_APPLE_APP_ID=${FIESTAAA_APPLE_APP_ID}
            FIESTAAA_APPLE_REDIRECT_URI=${FIESTAAA_APPLE_REDIRECT_URI}
            FIESTAAA_APPLE_SERVICE_ID=${FIESTAAA_APPLE_SERVICE_ID}
            FIESTAAA_FCM_VAPID_KEY=${FIESTAAA_FCM_VAPID_KEY}
            FIESTAAA_GOOGLE_ANDROID_CLIENT_ID=${FIESTAAA_GOOGLE_ANDROID_CLIENT_ID}
            FIESTAAA_GOOGLE_WEB_CLIENT_ID=${FIESTAAA_GOOGLE_WEB_CLIENT_ID}
            FIESTAAA_GOOGLE_IOS_CLIENT_ID=${FIESTAAA_GOOGLE_IOS_CLIENT_ID}
            RESEND_API_KEY=${RESEND_API_KEY}
            INVITATION_EMAIL_SENDER=${INVITATION_EMAIL_SENDER}
            JWT_SECRET=${JWT_SECRET}
            METRICS_BEARER_TOKEN=${METRICS_BEARER_TOKEN}
            NOTIFICATION_DEDUP_TTL_SECONDS=${NOTIFICATION_DEDUP_TTL_SECONDS}
            POSTGRES_DB=${POSTGRES_DB}
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            POSTGRES_USER=${POSTGRES_USER}
            REDIS_URL=${REDIS_URL}
            ADMIN_EMAILS=${ADMIN_EMAILS}
            GRAFANA_ADMIN_USER=${GRAFANA_ADMIN_USER}
            GRAFANA_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
            SENTRY_DSN=${SENTRY_DSN}
            SENTRY_ENVIRONMENT=${SENTRY_ENVIRONMENT}
            SENTRY_TRACES_SAMPLE_RATE=${SENTRY_TRACES_SAMPLE_RATE}
            POSTGRES_BACKUP_RETENTION_DAYS=${POSTGRES_BACKUP_RETENTION_DAYS}
            POSTGRES_BACKUP_INTERVAL_SECONDS=${POSTGRES_BACKUP_INTERVAL_SECONDS}
            BACKUP_INCLUDE_SECRETS=${BACKUP_INCLUDE_SECRETS}
            EOF
            chmod 600 .env
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin
            docker compose pull
            docker compose up -d
            docker compose ps
        env:
          ADMIN_EMAILS: ${{ secrets.ADMIN_EMAILS }}
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          AVATAR_BASE_URL: ${{ secrets.AVATAR_BASE_URL }}
          AVATAR_UPLOAD_DIR: ${{ secrets.AVATAR_UPLOAD_DIR }}
          CORS_ALLOWED_ORIGINS: ${{ secrets.CORS_ALLOWED_ORIGINS }}
          DATA_ENCRYPTION_KEY: ${{ secrets.DATA_ENCRYPTION_KEY }}
          DATA_LOOKUP_KEY: ${{ secrets.DATA_LOOKUP_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          FCM_PROJECT_ID: ${{ secrets.FCM_PROJECT_ID }}
          FCM_SERVICE_ACCOUNT_JSON_B64: ${{ secrets.FCM_SERVICE_ACCOUNT_JSON_B64 }}
          FCM_SERVICE_ACCOUNT_PATH: ${{ secrets.FCM_SERVICE_ACCOUNT_PATH }}
          FCM_SERVER_KEY: ${{ secrets.FCM_SERVER_KEY }}
          FIESTAAA_APPLE_APP_ID: ${{ secrets.FIESTAAA_APPLE_APP_ID }}
          FIESTAAA_APPLE_REDIRECT_URI: ${{ secrets.FIESTAAA_APPLE_REDIRECT_URI }}
          FIESTAAA_APPLE_SERVICE_ID: ${{ secrets.FIESTAAA_APPLE_SERVICE_ID }}
          FIESTAAA_FCM_VAPID_KEY: ${{ secrets.FIESTAAA_FCM_VAPID_KEY }}
          FIESTAAA_GOOGLE_ANDROID_CLIENT_ID: ${{ secrets.FIESTAAA_GOOGLE_ANDROID_CLIENT_ID }}
          FIESTAAA_GOOGLE_WEB_CLIENT_ID: ${{ secrets.FIESTAAA_GOOGLE_WEB_CLIENT_ID }}
          FIESTAAA_GOOGLE_IOS_CLIENT_ID: ${{ secrets.FIESTAAA_GOOGLE_IOS_CLIENT_ID }}
          FRONT_IMAGE_TAG: ${{ inputs.front_image_tag }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME || github.repository_owner }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GRAFANA_ADMIN_USER: ${{ secrets.GRAFANA_ADMIN_USER || 'admin' }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
          INVITATION_EMAIL_SENDER: ${{ secrets.INVITATION_EMAIL_SENDER }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          METRICS_BEARER_TOKEN: ${{ secrets.METRICS_BEARER_TOKEN }}
          NOTIFICATION_DEDUP_TTL_SECONDS: ${{ secrets.NOTIFICATION_DEDUP_TTL_SECONDS }}
          POSTGRES_BACKUP_INTERVAL_SECONDS: ${{ vars.POSTGRES_BACKUP_INTERVAL_SECONDS || '86400' }}
          POSTGRES_BACKUP_RETENTION_DAYS: ${{ vars.POSTGRES_BACKUP_RETENTION_DAYS || '14' }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_ENVIRONMENT: ${{ vars.SENTRY_ENVIRONMENT || 'production' }}
          SENTRY_TRACES_SAMPLE_RATE: ${{ vars.SENTRY_TRACES_SAMPLE_RATE || '0' }}
          TAG: ${{ github.sha }}
          VPS_USER: ${{ secrets.VPS_USER }}

      - name: Verify public health checks
        run: |
          curl --fail --silent --show-error --retry 12 --retry-delay 5 --retry-all-errors https://api.fiestaaa.app/health
          curl --fail --silent --show-error --head --retry 12 --retry-delay 5 --retry-all-errors https://fiestaaa.app
          curl --fail --silent --show-error --head --retry 12 --retry-delay 5 --retry-all-errors https://www.fiestaaa.app
          for url in http://fiestaaa.app http://api.fiestaaa.app; do
            for attempt in $(seq 1 12); do
              status="$(curl --silent --show-error --output /dev/null --write-out "%{http_code}" "${url}" || true)"
              if [ "${status}" = "301" ] || [ "${status}" = "308" ]; then
                break
              fi
              if [ "${attempt}" = "12" ]; then
                echo "::error::Expected ${url} to redirect permanently to HTTPS, got HTTP ${status}"
                exit 1
              fi
              sleep 5
            done
          done
