name: Build and Deploy
on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Docker login GHCR (GITHUB_TOKEN)
        run: echo "${{ github.token }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build image
        run: |
          docker build -t ghcr.io/theopeuchlestrade/fiestaaa_back:${{ github.sha }} \
                        -t ghcr.io/theopeuchlestrade/fiestaaa_back:latest .

      - name: Push image
        run: docker push ghcr.io/theopeuchlestrade/fiestaaa_back --all-tags

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/apps/fiestaaa
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin
            docker compose pull api
            docker compose up -d api
        env:
          GHCR_USERNAME: theopeuchlestrade
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}  # PAT read:packages pour le pull
