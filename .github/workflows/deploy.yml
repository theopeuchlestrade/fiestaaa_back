name: Build and Deploy
on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      force_build:
        description: "Ignore existing image and rebuild"
        type: boolean
        default: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ghcr.io/theopeuchlestrade/fiestaaa_back
      TAG: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v5

      - name: Check required secrets
        env:
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          AVATAR_BASE_URL: ${{ secrets.AVATAR_BASE_URL }}
          AVATAR_UPLOAD_DIR: ${{ secrets.AVATAR_UPLOAD_DIR }}
          CORS_ALLOWED_ORIGINS: ${{ secrets.CORS_ALLOWED_ORIGINS }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          FCM_PROJECT_ID: ${{ secrets.FCM_PROJECT_ID }}
          FCM_SERVICE_ACCOUNT_PATH: ${{ secrets.FCM_SERVICE_ACCOUNT_PATH }}
          FCM_SERVER_KEY: ${{ secrets.FCM_SERVER_KEY }}
          FIESTAAA_APPLE_REDIRECT_URI: ${{ secrets.FIESTAAA_APPLE_REDIRECT_URI }}
          FIESTAAA_APPLE_SERVICE_ID: ${{ secrets.FIESTAAA_APPLE_SERVICE_ID }}
          FIESTAAA_FCM_VAPID_KEY: ${{ secrets.FIESTAAA_FCM_VAPID_KEY }}
          FIESTAAA_GOOGLE_WEB_CLIENT_ID: ${{ secrets.FIESTAAA_GOOGLE_WEB_CLIENT_ID }}
          FIESTAAA_GOOGLE_IOS_CLIENT_ID: ${{ secrets.FIESTAAA_GOOGLE_IOS_CLIENT_ID }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          INVITATION_EMAIL_SENDER: ${{ secrets.INVITATION_EMAIL_SENDER }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          NOTIFICATION_DEDUP_TTL_SECONDS: ${{ secrets.NOTIFICATION_DEDUP_TTL_SECONDS }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          missing=0
          for var in VPS_HOST VPS_USER VPS_SSH_KEY GHCR_TOKEN; do
            if [ -z "${!var}" ]; then echo "::error::$var manquant"; missing=1; fi
          done
          for var in APP_BASE_URL AVATAR_BASE_URL AVATAR_UPLOAD_DIR CORS_ALLOWED_ORIGINS DATABASE_URL FCM_PROJECT_ID FCM_SERVER_KEY FCM_SERVICE_ACCOUNT_PATH FIESTAAA_APPLE_REDIRECT_URI FIESTAAA_APPLE_SERVICE_ID FIESTAAA_FCM_VAPID_KEY FIESTAAA_GOOGLE_WEB_CLIENT_ID FIESTAAA_GOOGLE_IOS_CLIENT_ID RESEND_API_KEY INVITATION_EMAIL_SENDER JWT_SECRET NOTIFICATION_DEDUP_TTL_SECONDS POSTGRES_DB POSTGRES_PASSWORD POSTGRES_USER REDIS_URL; do
            if [ -z "${!var}" ]; then echo "::error::$var manquant pour .env"; missing=1; fi
          done
          if [ "$missing" -ne 0 ]; then exit 1; fi

      - name: Login to GHCR for push
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if image exists
        id: image_exists
        run: |
          if docker manifest inspect "$IMAGE:$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build image
        if: steps.image_exists.outputs.exists == 'false' || (github.event_name == 'workflow_dispatch' && github.event.inputs.force_build == 'true')
        run: |
          docker build -t $IMAGE:$TAG -t $IMAGE:latest .

      - name: Push image
        if: steps.image_exists.outputs.exists == 'false' || (github.event_name == 'workflow_dispatch' && github.event.inputs.force_build == 'true')
        run: docker push $IMAGE --all-tags

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          envs: APP_BASE_URL,AVATAR_BASE_URL,AVATAR_UPLOAD_DIR,CORS_ALLOWED_ORIGINS,DATABASE_URL,FCM_PROJECT_ID,FCM_SERVICE_ACCOUNT_PATH,FCM_SERVER_KEY,FIESTAAA_APPLE_REDIRECT_URI,FIESTAAA_APPLE_SERVICE_ID,FIESTAAA_FCM_VAPID_KEY,FIESTAAA_GOOGLE_WEB_CLIENT_ID,FIESTAAA_GOOGLE_IOS_CLIENT_ID,RESEND_API_KEY,INVITATION_EMAIL_SENDER,JWT_SECRET,NOTIFICATION_DEDUP_TTL_SECONDS,POSTGRES_DB,POSTGRES_PASSWORD,POSTGRES_USER,REDIS_URL,GHCR_USERNAME,GHCR_TOKEN,VPS_HOST,VPS_USER
          script: |
            set -euo pipefail
            if [ -z "${VPS_USER:-}" ] || [ -z "${VPS_HOST:-}" ]; then
              echo "VPS_USER ou VPS_HOST manquant" >&2
              exit 1
            fi
            cd ~/apps/fiestaaa
            # Génère un .env à partir des secrets GitHub pour le runtime docker compose
            # Pas de quotes sur EOF afin d'expanser les variables côté runner et éviter les valeurs littérales ${VAR}
            cat > .env <<EOF
            APP_BASE_URL=${APP_BASE_URL}
            AVATAR_BASE_URL=${AVATAR_BASE_URL}
            AVATAR_UPLOAD_DIR=${AVATAR_UPLOAD_DIR}
            CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
            DATABASE_URL=${DATABASE_URL}
            FCM_PROJECT_ID=${FCM_PROJECT_ID}
            FCM_SERVICE_ACCOUNT_PATH=${FCM_SERVICE_ACCOUNT_PATH}
            FCM_SERVER_KEY=${FCM_SERVER_KEY}
            FIESTAAA_APPLE_REDIRECT_URI=${FIESTAAA_APPLE_REDIRECT_URI}
            FIESTAAA_APPLE_SERVICE_ID=${FIESTAAA_APPLE_SERVICE_ID}
            FIESTAAA_FCM_VAPID_KEY=${FIESTAAA_FCM_VAPID_KEY}
            FIESTAAA_GOOGLE_WEB_CLIENT_ID=${FIESTAAA_GOOGLE_WEB_CLIENT_ID}
            FIESTAAA_GOOGLE_IOS_CLIENT_ID=${FIESTAAA_GOOGLE_IOS_CLIENT_ID}
            RESEND_API_KEY=${RESEND_API_KEY}
            INVITATION_EMAIL_SENDER=${INVITATION_EMAIL_SENDER}
            JWT_SECRET=${JWT_SECRET}
            NOTIFICATION_DEDUP_TTL_SECONDS=${NOTIFICATION_DEDUP_TTL_SECONDS}
            POSTGRES_DB=${POSTGRES_DB}
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            POSTGRES_USER=${POSTGRES_USER}
            REDIS_URL=${REDIS_URL}
            EOF
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin
            compose_cmd="docker compose"
            if ! docker compose version >/dev/null 2>&1; then
              if command -v docker-compose >/dev/null 2>&1; then
                compose_cmd="docker-compose"
              else
                echo "docker compose/docker-compose introuvable sur le VPS" >&2
                exit 1
              fi
            fi
            ${compose_cmd} pull api
            # Ne touche pas aux dépendances (db/redis) pour éviter les recréations inutiles et bugs docker-compose v1
            ${compose_cmd} up -d --no-deps api
        env:
          GHCR_USERNAME: theopeuchlestrade
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}  # PAT read:packages pour le pull
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          AVATAR_BASE_URL: ${{ secrets.AVATAR_BASE_URL }}
          AVATAR_UPLOAD_DIR: ${{ secrets.AVATAR_UPLOAD_DIR }}
          CORS_ALLOWED_ORIGINS: ${{ secrets.CORS_ALLOWED_ORIGINS }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          FCM_PROJECT_ID: ${{ secrets.FCM_PROJECT_ID }}
          FCM_SERVICE_ACCOUNT_PATH: ${{ secrets.FCM_SERVICE_ACCOUNT_PATH }}
          FCM_SERVER_KEY: ${{ secrets.FCM_SERVER_KEY }}
          FIESTAAA_APPLE_REDIRECT_URI: ${{ secrets.FIESTAAA_APPLE_REDIRECT_URI }}
          FIESTAAA_APPLE_SERVICE_ID: ${{ secrets.FIESTAAA_APPLE_SERVICE_ID }}
          FIESTAAA_FCM_VAPID_KEY: ${{ secrets.FIESTAAA_FCM_VAPID_KEY }}
          FIESTAAA_GOOGLE_WEB_CLIENT_ID: ${{ secrets.FIESTAAA_GOOGLE_WEB_CLIENT_ID }}
          FIESTAAA_GOOGLE_IOS_CLIENT_ID: ${{ secrets.FIESTAAA_GOOGLE_IOS_CLIENT_ID }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          INVITATION_EMAIL_SENDER: ${{ secrets.INVITATION_EMAIL_SENDER }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          NOTIFICATION_DEDUP_TTL_SECONDS: ${{ secrets.NOTIFICATION_DEDUP_TTL_SECONDS }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
