name: Backend Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Version bump to apply"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
          - custom
      custom_version:
        description: "Required only when release_type=custom, without the v prefix"
        required: false
        type: string
      deploy_to_vps:
        description: "Deploy the released image to the production VPS"
        required: true
        type: boolean
        default: true

concurrency:
  group: backend-release
  cancel-in-progress: false

permissions:
  contents: write
  packages: write
  attestations: write
  artifact-metadata: write
  id-token: write

env:
  CARGO_TERM_COLOR: always
  IMAGE: ghcr.io/${{ github.repository }}
  RUST_BACKTRACE: "1"

jobs:
  verify:
    name: Verify Release Candidate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fiestaaa_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d fiestaaa_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/fiestaaa_test
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Run full test suite
        run: cargo test --locked --all-targets --jobs 1 -- --test-threads=1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.11.1

      - name: Build production image
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          push: false
          tags: ${{ env.IMAGE }}:release-candidate-${{ github.sha }}

  prepare-release:
    name: Version, Commit and Tag
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: verify
    outputs:
      release_sha: ${{ steps.push.outputs.release_sha }}
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@1.96.0

      - name: Validate release version
        id: version
        env:
          CUSTOM_VERSION: ${{ inputs.custom_version }}
          RELEASE_TYPE: ${{ inputs.release_type }}
        run: |
          set -euo pipefail
          release_type="${RELEASE_TYPE}"
          custom_version="${CUSTOM_VERSION}"

          if [ "${release_type}" = "custom" ]; then
            version="${custom_version}"
            if [ -z "${version}" ]; then
              echo "::error::custom_version is required when release_type=custom"
              exit 1
            fi
          else
            if [ -n "${custom_version}" ]; then
              echo "::error::custom_version can only be set when release_type=custom"
              exit 1
            fi
            current_version="$(sed -nE 's/^version = "([0-9]+)\.([0-9]+)\.([0-9]+)".*/\1.\2.\3/p' Cargo.toml | head -n 1)"
            if [ -z "${current_version}" ]; then
              echo "::error::Cargo.toml version must use MAJOR.MINOR.PATCH"
              exit 1
            fi
            IFS=. read -r major minor patch <<< "${current_version}"
            case "${release_type}" in
              patch)
                patch=$((patch + 1))
                ;;
              minor)
                minor=$((minor + 1))
                patch=0
                ;;
              major)
                major=$((major + 1))
                minor=0
                patch=0
                ;;
              *)
                echo "::error::Unsupported release_type: ${release_type}"
                exit 1
                ;;
            esac
            version="${major}.${minor}.${patch}"
          fi

          if ! [[ "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::version must use MAJOR.MINOR.PATCH, for example 1.2.3"
            exit 1
          fi
          tag="v${version}"
          git fetch origin main --tags
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "::error::Tag ${tag} already exists"
            exit 1
          fi
          {
            echo "tag=${tag}"
            echo "version=${version}"
          } >> "${GITHUB_OUTPUT}"
          echo "::notice::Preparing ${release_type} release ${tag}"

      - name: Update Cargo version
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          # shellcheck disable=SC2016
          ruby -e '
            version = ENV.fetch("VERSION")
            manifest_path = "Cargo.toml"
            lock_path = "Cargo.lock"

            manifest = File.read(manifest_path)
            raise "Cargo.toml version not found" unless manifest.sub!(/^version = "[^"]+"/, "version = \"#{version}\"")
            File.write(manifest_path, manifest)

            lock = File.read(lock_path)
            pattern = /(\[\[package\]\]\nname = "fiestaaa_back"\nversion = ")[^"]+(")/
            raise "fiestaaa_back package not found in Cargo.lock" unless lock.sub!(pattern) { "#{$1}#{version}#{$2}" }
            File.write(lock_path, lock)
          '
          cargo metadata --locked --format-version 1 >/dev/null

      - name: Commit and tag release
        id: push
        env:
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- Cargo.toml Cargo.lock; then
            git add Cargo.toml Cargo.lock
            git commit -m "chore(release): ${TAG}"
          fi
          release_sha="$(git rev-parse HEAD)"
          git tag -a "${TAG}" -m "Release ${TAG}" "${release_sha}"
          git push origin HEAD:main
          git push origin "${TAG}"
          echo "release_sha=${release_sha}" >> "${GITHUB_OUTPUT}"

  publish-image:
    name: Publish Container Image
    runs-on: ubuntu-latest
    timeout-minutes: 40
    needs: prepare-release
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare-release.outputs.tag }}

      - name: Login to GHCR
        uses: docker/login-action@v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.11.1

      - name: Prepare image tags
        id: image-tags
        env:
          TAG: ${{ needs.prepare-release.outputs.tag }}
          VERSION: ${{ needs.prepare-release.outputs.version }}
        run: |
          {
            echo "tags<<EOF"
            echo "${IMAGE}:${TAG}"
            echo "${IMAGE}:${VERSION}"
            echo "${IMAGE}:latest"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push image
        id: push
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          push: true
          tags: ${{ steps.image-tags.outputs.tags }}
          labels: |
            org.opencontainers.image.version=${{ needs.prepare-release.outputs.tag }}
            org.opencontainers.image.revision=${{ needs.prepare-release.outputs.release_sha }}

      - name: Generate image attestation
        if: steps.push.outputs.digest != '' && !github.event.repository.private
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [prepare-release, publish-image]
    steps:
      - name: Publish release notes
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag }}
          name: Fiestaaa Backend ${{ needs.prepare-release.outputs.tag }}
          target_commitish: ${{ needs.prepare-release.outputs.release_sha }}
          generate_release_notes: true
          make_latest: true
          body: |
            Container image:
            `${{ env.IMAGE }}:${{ needs.prepare-release.outputs.tag }}`

            Digest:
            `${{ needs.publish-image.outputs.digest }}`

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [prepare-release, publish-image, github-release]
    if: ${{ inputs.deploy_to_vps }}
    environment:
      name: production
      url: https://api.fiestaaa.app
    env:
      TAG: ${{ needs.prepare-release.outputs.tag }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare-release.outputs.tag }}

      - name: Check required secrets
        env:
          ADMIN_EMAILS: ${{ secrets.ADMIN_EMAILS }}
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          AVATAR_BASE_URL: ${{ secrets.AVATAR_BASE_URL }}
          AVATAR_UPLOAD_DIR: ${{ secrets.AVATAR_UPLOAD_DIR }}
          CORS_ALLOWED_ORIGINS: ${{ secrets.CORS_ALLOWED_ORIGINS }}
          DATA_ENCRYPTION_KEY: ${{ secrets.DATA_ENCRYPTION_KEY }}
          DATA_LOOKUP_KEY: ${{ secrets.DATA_LOOKUP_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          FCM_PROJECT_ID: ${{ secrets.FCM_PROJECT_ID }}
          FCM_SERVICE_ACCOUNT_JSON_B64: ${{ secrets.FCM_SERVICE_ACCOUNT_JSON_B64 }}
          FCM_SERVICE_ACCOUNT_PATH: ${{ secrets.FCM_SERVICE_ACCOUNT_PATH }}
          FCM_SERVER_KEY: ${{ secrets.FCM_SERVER_KEY }}
          FIESTAAA_APPLE_APP_ID: ${{ secrets.FIESTAAA_APPLE_APP_ID }}
          FIESTAAA_APPLE_REDIRECT_URI: ${{ secrets.FIESTAAA_APPLE_REDIRECT_URI }}
          FIESTAAA_APPLE_SERVICE_ID: ${{ secrets.FIESTAAA_APPLE_SERVICE_ID }}
          FIESTAAA_FCM_VAPID_KEY: ${{ secrets.FIESTAAA_FCM_VAPID_KEY }}
          FIESTAAA_GOOGLE_ANDROID_CLIENT_ID: ${{ secrets.FIESTAAA_GOOGLE_ANDROID_CLIENT_ID }}
          FIESTAAA_GOOGLE_WEB_CLIENT_ID: ${{ secrets.FIESTAAA_GOOGLE_WEB_CLIENT_ID }}
          FIESTAAA_GOOGLE_IOS_CLIENT_ID: ${{ secrets.FIESTAAA_GOOGLE_IOS_CLIENT_ID }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          INVITATION_EMAIL_SENDER: ${{ secrets.INVITATION_EMAIL_SENDER }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          METRICS_BEARER_TOKEN: ${{ secrets.METRICS_BEARER_TOKEN }}
          NOTIFICATION_DEDUP_TTL_SECONDS: ${{ secrets.NOTIFICATION_DEDUP_TTL_SECONDS }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          missing=0
          for var in VPS_HOST VPS_PORT VPS_USER VPS_SSH_KEY GHCR_TOKEN; do
            if [ -z "${!var}" ]; then echo "::error::$var manquant"; missing=1; fi
          done
          for var in APP_BASE_URL AVATAR_BASE_URL AVATAR_UPLOAD_DIR CORS_ALLOWED_ORIGINS DATA_ENCRYPTION_KEY DATA_LOOKUP_KEY DATABASE_URL FCM_PROJECT_ID FCM_SERVICE_ACCOUNT_JSON_B64 FCM_SERVICE_ACCOUNT_PATH FIESTAAA_APPLE_REDIRECT_URI FIESTAAA_APPLE_SERVICE_ID FIESTAAA_FCM_VAPID_KEY FIESTAAA_GOOGLE_WEB_CLIENT_ID FIESTAAA_GOOGLE_IOS_CLIENT_ID RESEND_API_KEY INVITATION_EMAIL_SENDER JWT_SECRET METRICS_BEARER_TOKEN NOTIFICATION_DEDUP_TTL_SECONDS POSTGRES_DB POSTGRES_PASSWORD POSTGRES_USER REDIS_URL GRAFANA_ADMIN_PASSWORD SENTRY_DSN; do
            if [ -z "${!var}" ]; then echo "::error::$var manquant pour .env"; missing=1; fi
          done
          if [ -n "${FCM_SERVICE_ACCOUNT_JSON_B64:-}" ]; then
            tmp_service_account="$(mktemp)"
            if ! printf '%s' "${FCM_SERVICE_ACCOUNT_JSON_B64}" | base64 -d > "${tmp_service_account}"; then
              echo "::error::FCM_SERVICE_ACCOUNT_JSON_B64 n'est pas un base64 valide"
              missing=1
            elif ! jq -e '.type == "service_account" and (.project_id | type == "string" and length > 0) and (.client_email | type == "string" and length > 0) and (.private_key | type == "string" and contains("BEGIN PRIVATE KEY"))' "${tmp_service_account}" >/dev/null; then
              echo "::error::FCM_SERVICE_ACCOUNT_JSON_B64 ne contient pas un service-account.json Firebase valide"
              missing=1
            fi
            rm -f "${tmp_service_account}"
          fi
          if [ "$missing" -ne 0 ]; then exit 1; fi

      - name: Check VPS bootstrap state
        id: bootstrap
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          set -euo pipefail
          key_path="${RUNNER_TEMP}/fiestaaa_deploy"
          printf '%s\n' "${VPS_SSH_KEY}" > "${key_path}"
          chmod 600 "${key_path}"
          front_image_tag="$(
            ssh -i "${key_path}" \
              -p "${VPS_PORT}" \
              -o BatchMode=yes \
              -o StrictHostKeyChecking=accept-new \
              "${VPS_USER}@${VPS_HOST}" \
              "grep '^FRONT_IMAGE_TAG=' ~/apps/fiestaaa/.env 2>/dev/null | cut -d= -f2- || true"
          )"
          rm -f "${key_path}"
          if [ -z "${front_image_tag}" ]; then
            echo "ready=false" >> "${GITHUB_OUTPUT}"
            echo "::notice::Bootstrap initial non detecte: le deploy API est ignore jusqu'au workflow Bootstrap VPS Stack."
          else
            echo "ready=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Sync production runtime files
        if: steps.bootstrap.outputs.ready == 'true'
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          set -euo pipefail
          key_path="${RUNNER_TEMP}/fiestaaa_deploy"
          printf '%s\n' "${VPS_SSH_KEY}" > "${key_path}"
          chmod 600 "${key_path}"
          ssh -i "${key_path}" \
            -p "${VPS_PORT}" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=accept-new \
            "${VPS_USER}@${VPS_HOST}" \
            "mkdir -p ~/apps/fiestaaa"
          scp -i "${key_path}" \
            -P "${VPS_PORT}" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=accept-new \
            docker-compose.prod.yml \
            "${VPS_USER}@${VPS_HOST}:~/apps/fiestaaa/docker-compose.yml"
          scp -i "${key_path}" \
            -P "${VPS_PORT}" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=accept-new \
            -r observability scripts \
            "${VPS_USER}@${VPS_HOST}:~/apps/fiestaaa/"
          ssh -i "${key_path}" \
            -p "${VPS_PORT}" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=accept-new \
            "${VPS_USER}@${VPS_HOST}" \
            "chmod +x ~/apps/fiestaaa/scripts/backup_runtime.sh ~/apps/fiestaaa/scripts/restore_drill_postgres.sh"
          rm -f "${key_path}"

      - name: Deploy to VPS
        if: steps.bootstrap.outputs.ready == 'true'
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          envs: ADMIN_EMAILS,APP_BASE_URL,AVATAR_BASE_URL,AVATAR_UPLOAD_DIR,BACKUP_INCLUDE_SECRETS,CORS_ALLOWED_ORIGINS,DATA_ENCRYPTION_KEY,DATA_LOOKUP_KEY,DATABASE_URL,FCM_PROJECT_ID,FCM_SERVICE_ACCOUNT_JSON_B64,FCM_SERVICE_ACCOUNT_PATH,FCM_SERVER_KEY,FIESTAAA_APPLE_APP_ID,FIESTAAA_APPLE_REDIRECT_URI,FIESTAAA_APPLE_SERVICE_ID,FIESTAAA_FCM_VAPID_KEY,FIESTAAA_GOOGLE_ANDROID_CLIENT_ID,FIESTAAA_GOOGLE_WEB_CLIENT_ID,FIESTAAA_GOOGLE_IOS_CLIENT_ID,GRAFANA_ADMIN_PASSWORD,GRAFANA_ADMIN_USER,METRICS_BEARER_TOKEN,POSTGRES_BACKUP_INTERVAL_SECONDS,POSTGRES_BACKUP_RETENTION_DAYS,RESEND_API_KEY,INVITATION_EMAIL_SENDER,JWT_SECRET,NOTIFICATION_DEDUP_TTL_SECONDS,POSTGRES_DB,POSTGRES_PASSWORD,POSTGRES_USER,REDIS_URL,SENTRY_DSN,SENTRY_ENVIRONMENT,SENTRY_TRACES_SAMPLE_RATE,GHCR_USERNAME,GHCR_TOKEN,VPS_HOST,VPS_USER,TAG
          script: |
            set -euo pipefail
            if [ -z "${VPS_USER:-}" ] || [ -z "${VPS_HOST:-}" ]; then
              echo "VPS_USER ou VPS_HOST manquant" >&2
              exit 1
            fi
            cd ~/apps/fiestaaa
            umask 077
            current_front_image_tag="$(grep '^FRONT_IMAGE_TAG=' .env 2>/dev/null | cut -d= -f2- || true)"
            if [ -z "${current_front_image_tag}" ]; then
              echo "FRONT_IMAGE_TAG missing in ~/apps/fiestaaa/.env. Seed both API_IMAGE_TAG and FRONT_IMAGE_TAG before the first deployment." >&2
              exit 1
            fi
            sudo install -d -m 755 -o "${VPS_USER}" data
            if [ -z "${FCM_SERVICE_ACCOUNT_JSON_B64:-}" ]; then
              echo "FCM_SERVICE_ACCOUNT_JSON_B64 missing; refusing to deploy with a placeholder service-account.json" >&2
              exit 1
            fi
            tmp_service_account="$(mktemp)"
            if ! printf '%s' "${FCM_SERVICE_ACCOUNT_JSON_B64}" | base64 -d > "${tmp_service_account}"; then
              echo "FCM_SERVICE_ACCOUNT_JSON_B64 is not valid base64" >&2
              rm -f "${tmp_service_account}"
              exit 1
            fi
            if ! grep -Eq '"private_key"[[:space:]]*:' "${tmp_service_account}" || ! grep -Eq '"client_email"[[:space:]]*:' "${tmp_service_account}" || ! grep -Eq '"project_id"[[:space:]]*:' "${tmp_service_account}"; then
              echo "Decoded FCM service account is missing private_key, client_email, or project_id" >&2
              rm -f "${tmp_service_account}"
              exit 1
            fi
            sudo install -m 400 "${tmp_service_account}" data/service-account.json
            sudo chown 10001:10001 data/service-account.json
            rm -f "${tmp_service_account}"
            sudo install -d -m 750 data/uploads data/uploads/avatars
            sudo chown 10001:10001 data/uploads data/uploads/avatars
            sudo chmod 750 data/uploads data/uploads/avatars
            sudo install -d -m 750 -o "${VPS_USER}" -g "${VPS_USER}" data/backups data/backups/postgres data/backups/files secrets
            sudo install -d -m 750 data/prometheus data/loki data/grafana
            sudo chown 65534:65534 data/prometheus
            sudo chown 10001:10001 data/loki
            sudo chown 472:472 data/grafana
            tmp_metrics_token="$(mktemp)"
            printf '%s' "${METRICS_BEARER_TOKEN}" > "${tmp_metrics_token}"
            sudo install -m 400 -o 65534 -g 65534 "${tmp_metrics_token}" secrets/metrics_token
            rm -f "${tmp_metrics_token}"
            install -m 600 /dev/null .env
            cat > .env <<EOF
            API_IMAGE_TAG=${TAG}
            FRONT_IMAGE_TAG=${current_front_image_tag}
            APP_BASE_URL=${APP_BASE_URL}
            AVATAR_BASE_URL=${AVATAR_BASE_URL}
            AVATAR_UPLOAD_DIR=${AVATAR_UPLOAD_DIR}
            CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
            DATA_ENCRYPTION_KEY=${DATA_ENCRYPTION_KEY}
            DATA_LOOKUP_KEY=${DATA_LOOKUP_KEY}
            DATABASE_URL=${DATABASE_URL}
            TRUST_PROXY_HEADERS=true
            FCM_PROJECT_ID=${FCM_PROJECT_ID}
            FCM_SERVICE_ACCOUNT_PATH=${FCM_SERVICE_ACCOUNT_PATH}
            FCM_SERVER_KEY=${FCM_SERVER_KEY}
            FIESTAAA_APPLE_APP_ID=${FIESTAAA_APPLE_APP_ID}
            FIESTAAA_APPLE_REDIRECT_URI=${FIESTAAA_APPLE_REDIRECT_URI}
            FIESTAAA_APPLE_SERVICE_ID=${FIESTAAA_APPLE_SERVICE_ID}
            FIESTAAA_FCM_VAPID_KEY=${FIESTAAA_FCM_VAPID_KEY}
            FIESTAAA_GOOGLE_ANDROID_CLIENT_ID=${FIESTAAA_GOOGLE_ANDROID_CLIENT_ID}
            FIESTAAA_GOOGLE_WEB_CLIENT_ID=${FIESTAAA_GOOGLE_WEB_CLIENT_ID}
            FIESTAAA_GOOGLE_IOS_CLIENT_ID=${FIESTAAA_GOOGLE_IOS_CLIENT_ID}
            RESEND_API_KEY=${RESEND_API_KEY}
            INVITATION_EMAIL_SENDER=${INVITATION_EMAIL_SENDER}
            JWT_SECRET=${JWT_SECRET}
            METRICS_BEARER_TOKEN=${METRICS_BEARER_TOKEN}
            NOTIFICATION_DEDUP_TTL_SECONDS=${NOTIFICATION_DEDUP_TTL_SECONDS}
            POSTGRES_DB=${POSTGRES_DB}
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            POSTGRES_USER=${POSTGRES_USER}
            REDIS_URL=${REDIS_URL}
            ADMIN_EMAILS=${ADMIN_EMAILS}
            GRAFANA_ADMIN_USER=${GRAFANA_ADMIN_USER}
            GRAFANA_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
            SENTRY_DSN=${SENTRY_DSN}
            SENTRY_ENVIRONMENT=${SENTRY_ENVIRONMENT}
            SENTRY_TRACES_SAMPLE_RATE=${SENTRY_TRACES_SAMPLE_RATE}
            POSTGRES_BACKUP_RETENTION_DAYS=${POSTGRES_BACKUP_RETENTION_DAYS}
            POSTGRES_BACKUP_INTERVAL_SECONDS=${POSTGRES_BACKUP_INTERVAL_SECONDS}
            BACKUP_INCLUDE_SECRETS=${BACKUP_INCLUDE_SECRETS}
            EOF
            chmod 600 .env
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin
            compose_cmd="docker compose"
            if ! docker compose version >/dev/null 2>&1; then
              if command -v docker-compose >/dev/null 2>&1; then
                compose_cmd="docker-compose"
              else
                echo "docker compose/docker-compose not found on the VPS" >&2
                exit 1
              fi
            fi
            docker container prune -f >/dev/null 2>&1 || true
            docker image prune -af >/dev/null 2>&1 || true
            ${compose_cmd} pull api
            ${compose_cmd} up -d --no-deps traefik front api
            ${compose_cmd} ps
        env:
          ADMIN_EMAILS: ${{ secrets.ADMIN_EMAILS }}
          BACKUP_INCLUDE_SECRETS: ${{ vars.BACKUP_INCLUDE_SECRETS || 'false' }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME || github.repository_owner }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          TAG: ${{ needs.prepare-release.outputs.tag }}
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          AVATAR_BASE_URL: ${{ secrets.AVATAR_BASE_URL }}
          AVATAR_UPLOAD_DIR: ${{ secrets.AVATAR_UPLOAD_DIR }}
          CORS_ALLOWED_ORIGINS: ${{ secrets.CORS_ALLOWED_ORIGINS }}
          DATA_ENCRYPTION_KEY: ${{ secrets.DATA_ENCRYPTION_KEY }}
          DATA_LOOKUP_KEY: ${{ secrets.DATA_LOOKUP_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          FCM_PROJECT_ID: ${{ secrets.FCM_PROJECT_ID }}
          FCM_SERVICE_ACCOUNT_JSON_B64: ${{ secrets.FCM_SERVICE_ACCOUNT_JSON_B64 }}
          FCM_SERVICE_ACCOUNT_PATH: ${{ secrets.FCM_SERVICE_ACCOUNT_PATH }}
          FCM_SERVER_KEY: ${{ secrets.FCM_SERVER_KEY }}
          FIESTAAA_APPLE_APP_ID: ${{ secrets.FIESTAAA_APPLE_APP_ID }}
          FIESTAAA_APPLE_REDIRECT_URI: ${{ secrets.FIESTAAA_APPLE_REDIRECT_URI }}
          FIESTAAA_APPLE_SERVICE_ID: ${{ secrets.FIESTAAA_APPLE_SERVICE_ID }}
          FIESTAAA_FCM_VAPID_KEY: ${{ secrets.FIESTAAA_FCM_VAPID_KEY }}
          FIESTAAA_GOOGLE_ANDROID_CLIENT_ID: ${{ secrets.FIESTAAA_GOOGLE_ANDROID_CLIENT_ID }}
          FIESTAAA_GOOGLE_WEB_CLIENT_ID: ${{ secrets.FIESTAAA_GOOGLE_WEB_CLIENT_ID }}
          FIESTAAA_GOOGLE_IOS_CLIENT_ID: ${{ secrets.FIESTAAA_GOOGLE_IOS_CLIENT_ID }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          INVITATION_EMAIL_SENDER: ${{ secrets.INVITATION_EMAIL_SENDER }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          METRICS_BEARER_TOKEN: ${{ secrets.METRICS_BEARER_TOKEN }}
          NOTIFICATION_DEDUP_TTL_SECONDS: ${{ secrets.NOTIFICATION_DEDUP_TTL_SECONDS }}
          POSTGRES_BACKUP_INTERVAL_SECONDS: ${{ vars.POSTGRES_BACKUP_INTERVAL_SECONDS || '86400' }}
          POSTGRES_BACKUP_RETENTION_DAYS: ${{ vars.POSTGRES_BACKUP_RETENTION_DAYS || '14' }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          GRAFANA_ADMIN_USER: ${{ secrets.GRAFANA_ADMIN_USER || 'admin' }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_ENVIRONMENT: ${{ vars.SENTRY_ENVIRONMENT || 'production' }}
          SENTRY_TRACES_SAMPLE_RATE: ${{ vars.SENTRY_TRACES_SAMPLE_RATE || '0' }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}

      - name: Verify public health checks
        if: steps.bootstrap.outputs.ready == 'true'
        run: |
          curl --fail --silent --show-error --retry 12 --retry-delay 5 --retry-all-errors https://api.fiestaaa.app/health
          curl --fail --silent --show-error --head --retry 12 --retry-delay 5 --retry-all-errors https://fiestaaa.app
          curl --fail --silent --show-error --head --retry 12 --retry-delay 5 --retry-all-errors https://www.fiestaaa.app
          for url in http://fiestaaa.app http://api.fiestaaa.app; do
            for attempt in $(seq 1 12); do
              status="$(curl --silent --show-error --output /dev/null --write-out "%{http_code}" "${url}" || true)"
              if [ "${status}" = "301" ] || [ "${status}" = "308" ]; then
                break
              fi
              if [ "${attempt}" = "12" ]; then
                echo "::error::Expected ${url} to redirect permanently to HTTPS, got HTTP ${status}"
                exit 1
              fi
              sleep 5
            done
          done
