name: Feature request
description: Suggest a backend improvement or capability.
title: "Feature: "
labels:
  - feature
  - backend
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior, API, or workflow you want.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: List any other approaches you considered.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add links, screenshots, or implementation notes if useful.
