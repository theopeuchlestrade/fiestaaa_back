services:
  socket-proxy:
    image: tecnativa/docker-socket-proxy:0.3.0
    environment:
      CONTAINERS: 1
      EVENTS: 1
      INFO: 1
      NETWORKS: 1
      PING: 1
      VERSION: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    read_only: true
    tmpfs:
      - /run
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - docker-api
    restart: unless-stopped

  traefik:
    image: traefik:v3.6
    command:
      - --providers.docker=true
      - --providers.docker.endpoint=tcp://socket-proxy:2375
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.le.acme.httpchallenge=true
      - --certificatesresolvers.le.acme.httpchallenge.entrypoint=web
      - --certificatesresolvers.le.acme.email=contact@fiestaaa.app
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
    depends_on:
      - socket-proxy
    ports: ["80:80", "443:443"]
    volumes:
      - ./traefik/letsencrypt:/letsencrypt
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    networks:
      - default
      - docker-api
    restart: unless-stopped

  db:
    image: postgres:18
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./data/postgres:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  redis:
    image: redis:8-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  api:
    image: ghcr.io/theopeuchlestrade/fiestaaa_back:${API_IMAGE_TAG:?API_IMAGE_TAG is required}
    env_file: .env
    environment:
      HOST: 0.0.0.0
      PORT: 8080
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      TRUST_PROXY_HEADERS: ${TRUST_PROXY_HEADERS:-true}
      AVATAR_UPLOAD_DIR: /data/uploads/avatars
      AVATAR_BASE_URL: https://api.fiestaaa.app/media/avatars
      FCM_SERVICE_ACCOUNT_PATH: /app/service-account.json
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./data/uploads:/data/uploads
      - ./data/service-account.json:/app/service-account.json:ro
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    labels:
      - traefik.enable=true
      - traefik.http.routers.api.rule=Host(`api.fiestaaa.app`)
      - traefik.http.routers.api.entrypoints=websecure
      - traefik.http.routers.api.tls.certresolver=le
      - traefik.http.services.api.loadbalancer.server.port=8080
    restart: unless-stopped

  front:
    image: ghcr.io/theopeuchlestrade/fiestaaa_front:${FRONT_IMAGE_TAG:?FRONT_IMAGE_TAG is required}
    labels:
      - traefik.enable=true
      - traefik.http.routers.front.rule=Host(`fiestaaa.app`)
      - traefik.http.routers.front.entrypoints=websecure
      - traefik.http.routers.front.tls.certresolver=le
      - traefik.http.services.front.loadbalancer.server.port=8080
    depends_on:
      - api
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped

networks:
  docker-api:
    internal: true
