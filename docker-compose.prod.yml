services:
  socket-proxy:
    image: tecnativa/docker-socket-proxy:0.3.0
    environment:
      CONTAINERS: 1
      EVENTS: 1
      INFO: 1
      NETWORKS: 1
      PING: 1
      VERSION: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    tmpfs:
      - /run
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - docker-api
    restart: unless-stopped

  traefik:
    image: traefik:v3.6
    command:
      - --providers.docker=true
      - --providers.docker.endpoint=tcp://socket-proxy:2375
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.web.http.redirections.entrypoint.permanent=true
      - --certificatesresolvers.le.acme.httpchallenge=true
      - --certificatesresolvers.le.acme.httpchallenge.entrypoint=web
      - --certificatesresolvers.le.acme.email=contact@fiestaaa.app
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
    depends_on:
      - socket-proxy
    ports: ["80:80", "443:443"]
    volumes:
      - ./traefik/letsencrypt:/letsencrypt
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    networks:
      - default
      - docker-api
    restart: unless-stopped

  db:
    image: postgres:18
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./data/postgres:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  redis:
    image: redis:8-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  api:
    image: ghcr.io/theopeuchlestrade/fiestaaa_back:${API_IMAGE_TAG:?API_IMAGE_TAG is required}
    user: "10001:10001"
    env_file: .env
    environment:
      HOST: 0.0.0.0
      PORT: 8080
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      METRICS_BEARER_TOKEN: ${METRICS_BEARER_TOKEN}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0}
      TRUST_PROXY_HEADERS: ${TRUST_PROXY_HEADERS:-true}
      AVATAR_UPLOAD_DIR: /data/uploads/avatars
      AVATAR_BASE_URL: https://api.fiestaaa.app/media/avatars
      FCM_SERVICE_ACCOUNT_PATH: /app/service-account.json
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./data/uploads:/data/uploads
      - ./data/service-account.json:/app/service-account.json:ro
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    labels:
      - traefik.enable=true
      - traefik.http.routers.api.rule=Host(`api.fiestaaa.app`)
      - traefik.http.routers.api.entrypoints=websecure
      - traefik.http.routers.api.tls.certresolver=le
      - traefik.http.services.api.loadbalancer.server.port=8080
    restart: unless-stopped

  front:
    image: ghcr.io/theopeuchlestrade/fiestaaa_front:${FRONT_IMAGE_TAG:?FRONT_IMAGE_TAG is required}
    labels:
      - traefik.enable=true
      - traefik.http.routers.front.rule=Host(`fiestaaa.app`) || Host(`www.fiestaaa.app`)
      - traefik.http.routers.front.entrypoints=websecure
      - traefik.http.routers.front.tls.certresolver=le
      - traefik.http.services.front.loadbalancer.server.port=8080
    depends_on:
      - api
    tmpfs:
      - /run:uid=101,gid=101,mode=0775
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.0.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    depends_on:
      - api
      - node-exporter
      - cadvisor
      - postgres-exporter
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./secrets/metrics_token:/run/secrets/metrics_token:ro
      - ./data/prometheus:/prometheus
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  loki:
    image: grafana/loki:3.0.0
    command: ["-config.file=/etc/loki/loki.yml"]
    volumes:
      - ./observability/loki/loki.yml:/etc/loki/loki.yml:ro
      - ./data/loki:/loki
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.0.0
    command: ["-config.file=/etc/promtail/promtail.yml"]
    depends_on:
      - loki
      - socket-proxy
    volumes:
      - ./observability/promtail/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    security_opt:
      - no-new-privileges:true
    networks:
      - default
      - docker-api
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.0.0
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    depends_on:
      - prometheus
      - loki
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./data/grafana:/var/lib/grafana
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:v1.8.2
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    restart: unless-stopped

  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
    environment:
      DATA_SOURCE_NAME: ${DATABASE_URL}
    depends_on:
      db:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  backup:
    image: postgres:18
    user: "0:0"
    working_dir: /app
    env_file: .env
    environment:
      POSTGRES_BACKUP_ROOT: /app/data/backups
      POSTGRES_BACKUP_RETENTION_DAYS: ${POSTGRES_BACKUP_RETENTION_DAYS:-14}
      POSTGRES_BACKUP_INTERVAL_SECONDS: ${POSTGRES_BACKUP_INTERVAL_SECONDS:-86400}
      BACKUP_INCLUDE_SECRETS: ${BACKUP_INCLUDE_SECRETS:-false}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./scripts:/app/scripts:ro
      - ./data/backups:/app/data/backups
      - ./data/uploads:/app/data/uploads:ro
      - ./traefik:/app/traefik:ro
      - ./.env:/app/.env:ro
      - ./data/service-account.json:/app/data/service-account.json:ro
    entrypoint:
      - /bin/bash
      - -lc
      - |
        while true; do
          /app/scripts/backup_runtime.sh || true;
          sleep "$${POSTGRES_BACKUP_INTERVAL_SECONDS:-86400}";
        done
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

networks:
  docker-api:
    internal: true
