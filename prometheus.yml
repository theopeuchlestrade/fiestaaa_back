global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'fiestaaa-api'
    metrics_path: '/metrics'
    bearer_token: 'fiestaaa-metrics-7e4c2a9f5b1d8e3c6a0f7b2d9c4e1a6f'
    static_configs:
      - targets: ['host.docker.internal:8080']
