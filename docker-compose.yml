services:
  api:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # In-compose DB host is the service name `db`
      DATABASE_URL: postgres://postgres:postgres@db:5432/fiestaaa
    ports:
      - "8080:8080"
    volumes:
      - .:/app
      - cargo-target:/app/target
  db:
    image: postgres:latest
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fiestaaa
    ports:
      - "5432:5432"
    volumes:
      # With Postgres 18+ use a single mount at /var/lib/postgresql to allow pg_upgrade layout
      - db_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data:
  cargo-target:
