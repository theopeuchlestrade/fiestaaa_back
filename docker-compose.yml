services:
  api:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    environment:
      # In-compose DB host is the service name `db`
      DATABASE_URL: postgres://postgres:postgres@db:5432/fiestaaa
      REDIS_URL: redis://redis:6379
      RUST_LOG: info,fiestaaa_back::notifications=debug
    ports:
      - "8080:8080"
    volumes:
      - .:/app
      - cargo-target:/app/target
  db:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fiestaaa
    ports:
      - "5432:5432"
    volumes:
      # With Postgres 18+ use a single mount at /var/lib/postgresql to allow pg_upgrade layout
      - db_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
  redis:
    image: redis:8-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]

volumes:
  db_data:
  cargo-target:
